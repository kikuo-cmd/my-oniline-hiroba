<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オンライン広場ゲーム（Render対応版）</title>
    <style>
        /* ⑥ 矢印キーで画面が勝手にスクロールしないようにする */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: sans-serif;
            background: #222;
        }
        #game-container {
            position: relative;
            width: 100%; height: 100%;
        }

        /* ① 右上メニュー（三マーク） */
        #menu-btn {
            position: absolute; top: 20px; right: 20px;
            font-size: 30px; background: #333; color: white;
            border: none; padding: 10px; cursor: pointer;
            z-index: 100; border-radius: 5px;
        }
        #menu-screen {
            display: none; position: absolute;
            top: 80px; right: 20px;
            background: rgba(0,0,0,0.9); color: white;
            padding: 20px; z-index: 100;
            border-radius: 10px; width: 220px;
        }
        .menu-btn-item {
            display: block; width: 100%;
            padding: 10px; margin: 5px 0;
            background: #444; color: white;
            border: none; cursor: pointer;
            border-radius: 5px; text-align: left;
        }
        .menu-input {
            width: 90%; padding: 6px;
            margin-bottom: 8px; border-radius: 4px;
            border: 1px solid #555; background: #fff;
        }
        /* ③ ④ ビдео通話パネル */
        #call-container { position:absolute; bottom:20px; left:20px; background:rgba(0, 0, 0, 0.7); padding:10px; border-radius:10px; color:white; z-index:90; display:flex; flex-direction:column; gap:5px; }
        .video-box { width:120px; height:90px; background:#333; display:flex; align-items:center; justify-content:center; font-size:10px; border-radius:5px; }
        .video-box video { width:100%; height:100%; object-fit:cover; }
        .call-controls button { padding:5px; cursor:pointer; background:#28a745; color:white; border:none; border-radius:3px; font-size:12px; }
        .call-controls button.off { background:#dc3545; }

        /* ⑤ ⑱ ⑲ 広場・公園マップの見た目 */
        #stage { position:absolute; top:0; left:0; width:3000px; height:3000px; background:#7cfc00; transition:transform 0.1s ease-out; }
        .obstacle { position:absolute; background:#8b4513; border-radius:5px; }
        .tree { background:#228b22; border-radius:50%; }
        .fountain { background:#1e90ff; border-radius:50%; }
        .bush { background:#006400; opacity:0.8; border-radius:10px; } /* ⑯ 草むら */
        .house { background:#cd853f; border:3px solid #8b4513; } /* ⑯ 家 */

        /* キャラクターとボスの見た目 */
        .character { position:absolute; width:40px; height:40px; border-radius:50%; background:#ff69b4; border:2px solid white; box-sizing:border-box; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; color:white; }
        .other-player { background:#00bfff; }
        .oni { background:#ff0000 !important; border:3px solid #ffd700; } /* ⑦ 鬼 */
        .boss { width:100px; height:100px; background:#4b0082; border:3px solid #ff4500; border-radius:10px; } /* ⑨ ボス */
        .effect { position:absolute; border-radius:50%; pointer-events:none; }

        /* ⑩ ⑭ ⑮ 招待・キャラ選択 */
        #invite-toast { display:none; position:absolute; top:20px; left:50%; transform:translateX(-50%); background:red; color:white; padding:15px; border-radius:20px; font-weight:bold; z-index:200; }
        #char-select-screen { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:white; z-index:150; flex-direction:column; align-items:center; justify-content:center; }
        .char-options { display:flex; gap:10px; margin-top:20px; }
        .char-card { background:#333; border:2px solid #555; padding:15px; border-radius:10px; cursor:pointer; text-align:center; width:110px; }
        #center-notice { position:absolute; top:150px; left:50%; transform:translateX(-50%); color:yellow; font-size:22px; font-weight:bold; text-shadow:2px 2px 2px black; z-index:80; text-align:center; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="stage"></div>
    <div id="invite-toast"></div>
    <div id="call-container">
        <div class="video-box" id="local-video-box">自分(カメラオフ)</div>
        <div class="video-box" id="remote-video-box">相手(映像なし)</div>
        <div class="call-controls"><button id="mic-btn">マイク:オン</button> <button id="cam-btn">カメラ:オン</button></div>
    </div>
    <div id="center-notice"></div>
    <button id="menu-btn">☰</button>
    <div id="menu-screen">
        <div style="margin-bottom:10px;">
            <h3>🔗 Render接続設定</h3>
            <p style="font-size:10px; color:#aaa; margin:0 0 5px 0;">Renderの「Web Service URL」を入力してください</p>
            <input type="text" id="server-url-input" class="menu-input" placeholder="wss://〇〇.onrender.com" value="">
            <h3>🔑 接続コード設定</h3>
            <input type="text" id="room-id-input" class="menu-input" value="room123">
            <button class="menu-btn-item" id="connect-btn" style="text-align:center; background:#007bff;">接続する</button>
        </div>
        <div>
            <h3>🎮 モード選択</h3>
            <button class="menu-btn-item" id="mode-lobby-btn">🌳 広場へ戻る</button>
            <button class="menu-btn-item" id="mode-tag-btn">🏃 鬼ごっこ開始</button>
            <button class="menu-btn-item" id="mode-boss-btn">⚔️ ボス討伐を誘う</button>
        </div>
    </div>
    <div id="char-select-screen">
        <h2>⚔️ キャラクター選択 ⚔️</h2>
        <p id="char-timer">残り時間: 30秒</p>
        <div class="char-options">
            <div class="char-card" onclick="selectJob('wizard')"><h3>🧙 魔法使い</h3><p style="font-size:10px;color:#aaa;">ファイア/氷/雷</p></div>
            <div class="char-card" onclick="selectJob('knight')"><h3>⚔️ 剣士</h3><p style="font-size:10px;color:#aaa;">斬撃/突撃/回転</p></div>
            <div class="char-card" onclick="selectJob('archer')"><h3>🏹 弓使い</h3><p style="font-size:10px;color:#aaa;">矢/連射/爆発</p></div>
        </div>
    </div>
</div>
<script>
    // 💡 あなただけの固有のIDをランダムに作成
    let myId = "player_" + Math.floor(Math.random() * 100000);
    let ws = null; // Renderサーバーと繋ぐための箱
    let currentMode = "lobby", myJob = "none", myPos = { x: 500, y: 500, speed: 6 }, keys = {}, obstacles = [];
    let activePlayerIds = new Set();
    
    // ① メニューの開け閉め
    const menuBtn = document.getElementById('menu-btn'), menuScreen = document.getElementById('menu-screen');
    menuBtn.addEventListener('click', () => menuScreen.style.display = menuScreen.style.display === 'block' ? 'none' : 'block');

    // ⑪ ⑫ ⑬ ⑳ Renderサーバーに接続する処理（別Wi-Fi・途中参加対応）
    document.getElementById('connect-btn').addEventListener('click', () => {
        let serverUrl = document.getElementById('server-url-input').value;
        const roomId = document.getElementById('room-id-input').value;
        
        if (!serverUrl) return alert("RenderのURL（wss://〇〇.onrender.com）を入力してください");
        if (!roomId) return alert("接続コードを入力してください");
        
        // 末尾の斜線（/）を自動で消す調整
        if (serverUrl.endsWith('/')) serverUrl = serverUrl.slice(0, -1);
        
        showNotice("Renderサーバーに接続中...");
        
        // あなた専用のRenderサーバーにWebsocket（リアルタイム通信）で接続します
        ws = new WebSocket(serverUrl);

        ws.onopen = () => {
            showNotice("広場に入りました！コード: " + roomId);
            menuScreen.style.display = 'none';
            // サーバーに「この接続コードの部屋に入ったよ」と合図を送る（途中参加データも自動で返ってきます）
            sendNetworkData({ type: 'join', room: roomId, id: myId, x: myPos.x, y: myPos.y });
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            handleNetworkData(data);
        };

        ws.onclose = () => {
            showNotice("サーバーから切断されました。再接続してください。");
        };
    };

    function sendNetworkData(data) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(data));
        }
    }

    // ⑤ ⑧ ⑯ マップ（公園）の自動作成
    function createMap(mode) {
        document.querySelectorAll('.obstacle').forEach(el => el.remove()); obstacles = [];
        const stage = document.getElementById('stage');
        if (mode === "lobby" || mode === "tag") {
            let count = mode === "tag" ? 40 : 15;
            addObstacle(1000, 1000, 150, 150, 'fountain');
            for (let i = 0; i < count; i++) {
                let x = Math.floor(Math.random() * 2500) + 100, y = Math.floor(Math.random() * 2500) + 100;
                if (Math.abs(x - 500) < 150 && Math.abs(y - 500) < 150) continue;
                let r = Math.random();
                if (r < 0.4) addObstacle(x, y, 60, 60, 'tree');
                else if (r < 0.8) addObstacle(x, y, 80, 60, 'bush');
                else addObstacle(x, y, 120, 100, 'house');
            }
        } else if (mode === "boss") {
            addObstacle(200, 200, 80, 80, 'tree'); addObstacle(600, 200, 80, 80, 'tree');
        }
    }

    function addObstacle(x, y, w, h, cls) {
        const div = document.createElement('div'); div.className = `obstacle ${cls}`;
        div.style.left = x+'px'; div.style.top = y+'px'; div.style.width = w+'px'; div.style.height = h+'px';
        document.getElementById('stage').appendChild(div); obstacles.push({ x, y, w, h });
    }

    function checkCollision(nx, ny, sz) {
        let max = currentMode === "boss" ? 900 : 2900;
        if (nx < 0 || nx > max || ny < 0 || ny > max) return true;
        for (let o of obstacles) { if (nx < o.x + o.w && nx + sz > o.x && ny < o.y + o.h && ny + sz > o.y) return true; }
        return false;
    }

    // ⑥ キーボードでの画面スクロールを禁止
    window.addEventListener('keydown', (e) => {
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) e.preventDefault();
        keys[e.key] = true;
    });
    window.addEventListener('keyup', (e) => keys[e.key] = false);

    const stage = document.getElementById('stage'), myEl = document.createElement('div');
    myEl.id = 'my-char'; myEl.className = 'character'; myEl.innerText = '自分'; stage.appendChild(myEl);

    function updateMovement() {
        let dx = 0, dy = 0;
        if (keys['ArrowUp'] || keys['w']) dy = -myPos.speed;
        if (keys['ArrowDown'] || keys['s']) dy = myPos.speed;
        if (keys['ArrowLeft'] || keys['a']) dx = -myPos.speed;
        if (keys['ArrowRight'] || keys['d']) dx = myPos.speed;
        if (dx !== 0 || dy !== 0) {
            if (!checkCollision(myPos.x + dx, myPos.y, 40)) myPos.x += dx;
            if (!checkCollision(myPos.x, myPos.y + dy, 40)) myPos.y += dy;
            myEl.style.left = myPos.x + 'px'; myEl.style.top = myPos.y + 'px';
            // ⑤ 自分中心にスクロール
            stage.style.transform = `translate(${window.innerWidth/2 - myPos.x}px, ${window.innerHeight/2 - myPos.y}px)`;
            sendNetworkData({ type: 'move', id: myId, x: myPos.x, y: myPos.y });
        }
        requestAnimationFrame(updateMovement);
    }
    createMap('lobby'); updateMovement();
    // ⑦ ⑧ 鬼ごっこモードのルール
    document.getElementById('mode-tag-btn').addEventListener('click', () => { startTagGame(); sendNetworkData({ type: 'start-tag' }); });
    function startTagGame() {
        currentMode = "tag"; menuScreen.style.display = 'none'; createMap('tag');
        if (Math.random() < 0.5) {
            myEl.classList.add('oni'); myEl.innerText = '👹 鬼'; myPos.speed = 8; // ⑦ 鬼は若干足が速い
            showNotice("あなたが鬼です！全員を捕まえて！");
        } else {
            myEl.classList.remove('oni'); myEl.innerText = '自分'; myPos.speed = 6;
            showNotice("鬼ごっこが始まりました！隠れて！");
        }
    }

    // ⑨ ⑩ ⑭ ⑮ ボス討伐モードのルール
    document.getElementById('mode-boss-btn').addEventListener('click', () => { sendNetworkData({ type: 'invite-boss', sender: 'だれか' }); triggerBossCountdown(); });
    function triggerBossCountdown() {
        let tl = 30; showNotice("⚔️ ボス討伐まであと30秒！");
        let cd = setInterval(() => {
            tl--; document.getElementById('char-timer').innerText = `残り時間: ${tl}秒`;
            if (tl <= 0) { clearInterval(cd); document.getElementById('char-select-screen').style.display = 'flex'; }
        }, 1000);
    }

    function selectJob(job) {
        myJob = job; document.getElementById('char-select-screen').style.display = 'none';
        currentMode = "boss"; document.getElementById('stage').style.width = '1000px'; document.getElementById('stage').style.height = '1000px';
        createMap('boss');
        myEl.innerText = job === 'wizard' ? '🧙魔' : job === 'knight' ? '⚔️剣' : '🏹弓';
        showNotice("【1, 2, 3】キーで3つの異なる攻撃ができます！");
        const bEl = document.createElement('div'); bEl.className = 'character boss'; bEl.style.left = '400px'; bEl.style.top = '400px'; bEl.innerText = '👹 BOSS'; stage.appendChild(bEl);
    }

    window.addEventListener('keypress', (e) => {
        if (currentMode !== "boss" || myJob === "none" || !['1','2','3'].includes(e.key)) return;
        let sName = "", col = "yellow";
        if (myJob === 'wizard') { sName = e.key==='1'?"🔥ファイア":e.key==='2'?"❄️氷":"⚡雷"; col = "orange"; }
        if (myJob === 'knight') { sName = e.key==='1'?"⚔️斬撃":e.key==='2'?"💨突撃":"🌀回転斬り"; col = "white"; }
        if (myJob === 'archer') { sName = e.key==='1'?"🏹矢":e.key==='2'?"🏹🏹連射":"💥爆発矢"; col = "red"; }
        showNotice(sName + " を放った！");
        createEffect(myPos.x+20, myPos.y+20, col);
        sendNetworkData({ type: 'attack', id: myId, x: myPos.x, y: myPos.y, color: col });
    });

    function createEffect(x, y, col) {
        const ef = document.createElement('div'); ef.className = 'effect'; ef.style.left = (x-20)+'px'; ef.style.top = (y-20)+'px'; ef.style.width = '40px'; ef.style.height = '40px'; ef.style.background = col; ef.style.boxShadow = `0 0 10px ${col}`; stage.appendChild(ef);
        setTimeout(() => ef.remove(), 300);
    }

    // ③ ④ ビデオ通話・マイクのオンオフ切り替え
    let stream = null;
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(s => { stream = s; document.getElementById('local-video-box').innerHTML = '<video id="mv" autoplay muted></video>'; document.getElementById('mv').srcObject = s; }).catch(() => {});
    document.getElementById('mic-btn').addEventListener('click', () => { if(stream) { stream.getAudioTracks().enabled = !stream.getAudioTracks().enabled; document.getElementById('mic-btn').innerText = stream.getAudioTracks().enabled ? "マイク:オン" : "マイク:オフ"; document.getElementById('mic-btn').classList.toggle('off'); } });
    document.getElementById('cam-btn').addEventListener('click', () => { if(stream) { stream.getVideoTracks().enabled = !stream.getVideoTracks().enabled; document.getElementById('cam-btn').innerText = stream.getVideoTracks().enabled ? "カメラ:オン" : "カメラ:オフ"; document.getElementById('cam-btn').classList.toggle('off'); } });

    // 📡 サーバーから届いた全員のデータを処理（途中参加・同期のコアシステム）
    function handleNetworkData(data) {
        // 【途中参加の同期処理】サーバーから全員分の位置リストが一気に届いたとき
        if (data.type === 'sync-all') {
            for (let id in data.players) {
                if (id === myId) continue;
                let p = data.players[id];
                updateOtherPlayerPosition(p.id, p.x, p.y);
            }
            return;
        }

        if (data.type === 'move' || data.type === 'join') {
            if (data.id === myId) return;
            updateOtherPlayerPosition(data.id, data.x, data.y);
        }
        
        if (data.type === 'leave') {
            let el = document.getElementById(data.id);
            if (el) el.remove();
            activePlayerIds.delete(data.id);
        }
        
        if (data.type === 'start-tag') startTagGame();
        
        if (data.type === 'invite-boss') {
            const t = document.getElementById('invite-toast'); t.innerText = `🚨 （誰かにボス討伐を誘われている！）`; t.style.display = 'block';
            triggerBossCountdown(); setTimeout(() => t.style.display = 'none', 5000);
        }
        
        if (data.type === 'attack') {
            if (data.id !== myId) createEffect(data.x+20, data.y+20, data.color);
        }
    }

    // 他のプレイヤーを画面に出現・移動させる関数
    function updateOtherPlayerPosition(id, x, y) {
        let oEl = document.getElementById(id);
        if (!oEl) {
            oEl = document.createElement('div'); oEl.id = id; oEl.className = 'character other-player'; oEl.innerText = '相手'; stage.appendChild(oEl);
            activePlayerIds.add(id);
        }
        oEl.style.left = x + 'px'; oEl.style.top = y + 'px';
    }

    function showNotice(txt) { const n = document.getElementById('center-notice'); n.innerText = txt; setTimeout(() => { if(n.innerText===txt) n.innerText=""; }, 3000); }
    document.getElementById('mode-lobby-btn').addEventListener('click', () => { currentMode = "lobby"; menuScreen.style.display = 'none'; myEl.className = 'character'; myEl.innerText = '自分'; myPos.speed = 6; createMap('lobby'); });
</script>
</body>
</html>
